name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_ADMIN_WORKER_URL: ${{ secrets.VITE_ADMIN_WORKER_URL }}
          VITE_MEDIA_WORKER_URL: ${{ secrets.VITE_MEDIA_WORKER_URL }}
          VITE_MEMBERSHIP_WORKER_URL: ${{ secrets.VITE_MEMBERSHIP_WORKER_URL }}
          VITE_EVENTS_WORKER_URL: ${{ secrets.VITE_EVENTS_WORKER_URL }}
          VITE_OAUTH_URL: ${{ secrets.VITE_OAUTH_URL }}
          VITE_OAUTH_SITE_ID: ${{ secrets.VITE_OAUTH_SITE_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name="${{ secrets.CLOUDFLARE_PAGES_PROJECT }}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
